buildscript {
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:7.4.2'
        classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.8.0'
    }
}

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

android {
    namespace 'com.grafana.faro.reactnative'
    compileSdkVersion 33

    defaultConfig {
        minSdkVersion 21
        targetSdkVersion 33
    }

    sourceSets {
        main {
            java.srcDirs = ['src/main/java']
        }
    }

    lintOptions {
        abortOnError false
    }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
    //noinspection GradleDynamicVersion
    implementation 'com.facebook.react:react-native:+'
    implementation 'org.jetbrains.kotlin:kotlin-stdlib:1.8.0'
}

/* ---------------------------------------------------------------------------
 * Faro: composed Hermes source-map upload (Android release).
 *
 * Because @grafana/faro-react-native is autolinked by React Native CLI, this
 * file is applied automatically — the consumer app needs ZERO edits to
 * `android/app/build.gradle`. Setup for the customer is:
 *
 *   1. npm install @grafana/faro-react-native @grafana/faro-metro-plugin
 *   2. Wrap metro.config.js with `withFaroConfig(...)`
 *   3. Export FARO_SOURCEMAP_* before running `yarn android --mode=release`.
 *      Bundle id is read from `app/build/faro/bundle-id-release.txt` when the
 *      `com.grafana.faro` Gradle plugin is applied (same id Metro uses).
 *
 * On any release-style command (assembleRelease, bundleRelease, installRelease,
 * `yarn android --mode=release`), release entry tasks depend on
 * `:app:faroUploadComposedSourceMapAndroidRelease`, which in turn depends on
 * the JS bundle task (`bundleReleaseJsAndAssets` or `createBundleReleaseJsAndAssets`)
 * so upload runs only after a successful bundle — never via a finalizer (which
 * can run even when bundling fails and could upload a stale map). The upload
 * task runs `faro-cli metro upload` via a small Node shim. Bundle id comes from
 * the Gradle plugin file; upload credentials from env. All values are passed as
 * **explicit CLI arguments** so the contract is visible in `--info` build output.
 *
 * Required at build time:
 *   Bundle id — `app/build/faro/bundle-id-release.txt` from `com.grafana.faro`
 *               (`faroWriteBundleIdRelease`). Same id Metro uses. Forwarded as --bundle-id.
 *
 * Required env (Gradle forwards each as a CLI flag):
 *   FARO_SOURCEMAP_ENDPOINT       — Forwarded as --endpoint.
 *   FARO_SOURCEMAP_APP_ID         — Forwarded as --app-id.
 *   FARO_SOURCEMAP_STACK_ID       — Forwarded as --stack-id.
 *   FARO_SOURCEMAP_API_KEY        — Forwarded as --api-key.
 *
 * Optional env at build time:
 *   FARO_SKIP_SOURCEMAP_UPLOAD=1  — skip the upload (e.g. offline iteration).
 *
 * Implementation notes:
 *   - We register and wire the task on the consumer's `:app` project (not on
 *     this library project), because `:app` is the one that runs
 *     `bundleReleaseJsAndAssets`.
 *   - We do all of that inside `gradle.projectsEvaluated` so all subprojects
 *     and their tasks are visible by the time we wire `dependsOn`.
 *   - All preconditions (shim present, composed map present, every required
 *     env var set) are checked in `onlyIf` so the build never hard-fails on a
 *     missing source-map upload — it just logs a warning and moves on.
 *   - We invoke `node_modules/@grafana/faro-metro-plugin/bin/faro-upload-source-map.js`
 *     (a thin shim that forwards to `faro-cli metro upload`). Going through
 *     the shim by absolute path keeps this hook insensitive to how the
 *     consumer's package manager hoists `@grafana/faro-cli`.
 *
 * Advanced users who don't install @grafana/faro-react-native can apply
 * `node_modules/@grafana/faro-metro-plugin/android/source-map-upload.gradle`
 * manually from their app's `android/app/build.gradle` instead.
 * --------------------------------------------------------------------------- */
gradle.projectsEvaluated {
    def appProject = rootProject.allprojects.find { it.path == ":app" }
    if (appProject == null) {
        logger.info("[Faro] :app project not found — skipping composed source map upload wiring.")
        return
    }

    def jsRoot = rootProject.projectDir.parentFile
    def cliPath = new File(jsRoot, "node_modules/@grafana/faro-metro-plugin/bin/faro-upload-source-map.js")
    def composedMap = new File(appProject.buildDir, "generated/sourcemaps/react/release/index.android.bundle.map")
    def bundleIdFile = new File(appProject.buildDir, "faro/bundle-id-release.txt")

    def readSourcemapsConfigValue = { String key ->
        def configFile = new File(jsRoot, "sourcemaps.config.json")
        if (!configFile.exists()) {
            return ""
        }
        try {
            def parsed = new groovy.json.JsonSlurper().parse(configFile)
            def val = parsed[key]
            return val == null ? "" : val.toString().trim()
        } catch (Exception e) {
            logger.error("[Faro] Failed to parse ${configFile}: ${e.message}")
            return ""
        }
    }

    def envOrSourcemapsConfig = { String envName, String configKey ->
        def fromEnv = (System.getenv(envName) ?: "").trim()
        if (!fromEnv.isEmpty()) {
            return fromEnv
        }
        return readSourcemapsConfigValue(configKey)
    }

    def resolveFaroBundleId = {
        if (!bundleIdFile.exists()) {
            return ""
        }
        def fromFile = bundleIdFile.getText("UTF-8").trim()
        return fromFile.isEmpty() ? "" : fromFile
    }

    def isValidAndroidBundleId = { String id ->
        id ==~ /^[^@]+@\d+@[^@]+$/
    }

    def uploadTask = appProject.tasks.register("faroUploadComposedSourceMapAndroidRelease", Exec) {
        group = "react"
        description = "Upload the composed Hermes Android source map to Faro."

        workingDir = jsRoot

        def faroSkip = (System.getenv("FARO_SKIP_SOURCEMAP_UPLOAD") ?: "").trim().toLowerCase()
        def faroEndpoint = envOrSourcemapsConfig("FARO_SOURCEMAP_ENDPOINT", "endpoint")
        def faroAppId = envOrSourcemapsConfig("FARO_SOURCEMAP_APP_ID", "appId")
        def faroStackId = envOrSourcemapsConfig("FARO_SOURCEMAP_STACK_ID", "stackId")
        def faroApiKey = envOrSourcemapsConfig("FARO_SOURCEMAP_API_KEY", "apiKey")

        // Capture the inputs we use for caching / up-to-date checks. We
        // deliberately *don't* track FARO_SOURCEMAP_API_KEY in inputs to
        // avoid Gradle leaking it into a cache-key string.
        inputs.file(composedMap).withPropertyName("composedMap").optional()
        inputs.file(bundleIdFile).withPropertyName("bundleIdFile").optional()
        inputs.property("faroEndpoint", faroEndpoint)
        inputs.property("faroAppId", faroAppId)
        inputs.property("faroStackId", faroStackId)
        inputs.property("faroSkipUpload", faroSkip)

        onlyIf {
            if (faroSkip == "1" || faroSkip == "true") {
                logger.lifecycle("[Faro] Skipping composed source map upload (FARO_SKIP_SOURCEMAP_UPLOAD=${faroSkip}).")
                return false
            }
            if (!cliPath.exists()) {
                logger.error("[Faro] Skipping composed source map upload — CLI shim not found at ${cliPath}. Install @grafana/faro-metro-plugin alongside @grafana/faro-react-native.")
                return false
            }
            if (!composedMap.exists()) {
                logger.error("[Faro] Skipping composed source map upload — ${composedMap} does not exist. Did Hermes precompile run?")
                return false
            }
            def resolvedBundleId = resolveFaroBundleId()
            def missing = []
            if (resolvedBundleId.isEmpty()) {
                missing << "bundle id file ${bundleIdFile} (apply com.grafana.faro and run faroWriteBundleIdRelease)"
            } else if (!isValidAndroidBundleId(resolvedBundleId)) {
                logger.error("[Faro] Skipping composed source map upload — invalid bundle id \"${resolvedBundleId}\" in ${bundleIdFile} (expected applicationId@versionCode@versionName).")
                return false
            }
            if (faroEndpoint.isEmpty()) missing << "FARO_SOURCEMAP_ENDPOINT"
            if (faroAppId.isEmpty()) missing << "FARO_SOURCEMAP_APP_ID"
            if (faroStackId.isEmpty()) missing << "FARO_SOURCEMAP_STACK_ID"
            if (faroApiKey.isEmpty()) missing << "FARO_SOURCEMAP_API_KEY"
            if (!missing.isEmpty()) {
                logger.error("[Faro] Skipping composed source map upload — missing: ${missing.join(", ")}. Set FARO_SOURCEMAP_* or fill sourcemaps.config.json (endpoint, appId, stackId, apiKey). Bundle id is read from ${bundleIdFile}.")
                return false
            }
            ext.resolvedBundleId = resolvedBundleId
            return true
        }

        doFirst {
            def bundleId = ext.resolvedBundleId ?: resolveFaroBundleId()
            commandLine(
                "node", cliPath.absolutePath,
                "--verbose",
                "--map", composedMap.absolutePath,
                "--endpoint", faroEndpoint,
                "--app-id", faroAppId,
                "--stack-id", faroStackId,
                "--api-key", faroApiKey,
                "--bundle-id", bundleId,
            )
        }
    }

    def bundleTaskNames = ["bundleReleaseJsAndAssets", "createBundleReleaseJsAndAssets"]
    uploadTask.configure { task ->
        def writeBundleIdTask = appProject.tasks.findByName("faroWriteBundleIdRelease")
        if (writeBundleIdTask != null) {
            task.dependsOn(writeBundleIdTask)
        }
        bundleTaskNames.each { name ->
            def bundleTask = appProject.tasks.findByName(name)
            if (bundleTask != null) {
                task.dependsOn(bundleTask)
            }
        }
    }

    ["assembleRelease", "bundleRelease", "installRelease"].each { name ->
        def releaseTask = appProject.tasks.findByName(name)
        if (releaseTask != null) {
            releaseTask.dependsOn(uploadTask)
        }
    }
}
