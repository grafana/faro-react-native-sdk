name: release-please

on:
  push:
    branches:
      - main
  # Manual retry when a push to main does not enqueue this workflow (rare GitHub delivery miss).
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      release_pr_branch: ${{ steps.release-branch.outputs.branch }}
      should_refresh_release_pr: ${{ steps.release-branch.outputs.should_refresh }}

    steps:
      - name: Mint GitHub App token
        id: get-github-app-token
        uses: grafana/shared-workflows/actions/create-github-app-token@259ba21cb3ff07724f331e26d926d655d24b317b # create-github-app-token/v0.2.3
        with:
          github_app: app-o11y-kwl-ci

      - uses: googleapis/release-please-action@64d83e95d898ede84e4555719aba555c3244d469
        id: release
        with:
          token: ${{ steps.get-github-app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: release-please-manifest.json

      # When release-please created or updated a release PR (prs_created), parse the
      # PR head branch. jq emits the literal string "null" when the field is missing.
      - name: Resolve release PR branch
        id: release-branch
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        env:
          PR_JSON: ${{ steps.release.outputs.pr }}
        run: |
          if [ -z "${PR_JSON}" ] || [ "${PR_JSON}" = "null" ]; then
            echo "should_refresh=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BRANCH="$(echo "$PR_JSON" | jq -r '.headBranchName')"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          if [ -n "${BRANCH}" ] && [ "${BRANCH}" != "null" ]; then
            echo "should_refresh=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_refresh=false" >> "$GITHUB_OUTPUT"
          fi

  # release-please rewrites cross-package dep ranges in each package.json but does
  # not touch yarn.lock. The pull-request workflow runs `yarn install --immutable`,
  # which fails on the release PR when the resolution would change. Yarn berry also
  # auto-enables hardened mode on public PR workflows, forbidding lockfile mutation.
  # Refresh yarn.lock, generated package meta, and CHANGELOG formatting on the release
  # branch so CI passes.
  refresh-release-pr:
    name: Refresh release PR
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.should_refresh_release_pr == 'true'
    permissions:
      contents: write
      id-token: write
    steps:
      # Job outputs cannot carry tokens; mint a fresh app token to push to the PR branch.
      - name: Mint GitHub App token
        id: get-github-app-token
        uses: grafana/shared-workflows/actions/create-github-app-token@259ba21cb3ff07724f331e26d926d655d24b317b # create-github-app-token/v0.2.3
        with:
          github_app: app-o11y-kwl-ci

      - name: Checkout release PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release-please.outputs.release_pr_branch }}
          token: ${{ steps.get-github-app-token.outputs.token }}
          persist-credentials: true

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      # Two cleanups happen here:
      #   1. Refresh yarn.lock — release-please rewrites cross-package dep ranges
      #      in package.json but does not touch yarn.lock. The Pull Request workflow
      #      runs `yarn install --frozen-lockfile`, which fails if the resolution
      #      would change.
      #   2. Run `yarn quality:format:packages` — the project's prettier config
      #      normalizes markdown bullets to `-`, while release-please writes `*`.
      #      The Pull Request workflow runs `yarn quality:lint`, which fails if
      #      CHANGELOG.md needs reformatting. Pre-format here so CI is clean.
      #   3. Sync generated package meta — release-please bumps package.json but
      #      does not run the npm "version" lifecycle hook.
      - name: Refresh yarn.lock and format release PR
        run: |
          set -euo pipefail
          # Yarn berry auto-enables hardened mode on public PR workflows, which
          # forbids modifying yarn.lock with a plain `yarn install`.
          # `--mode update-lockfile` writes the lockfile without installing
          # node_modules, bypassing the hardened-mode check.
          yarn install --mode update-lockfile
          # Now that the lockfile matches package.json, do a real install so
          # prettier/lerna are available for the format step.
          # `--immutable` is allowed in hardened mode because the lockfile is
          # already in sync.
          yarn install --immutable
          node packages/react-native/scripts/sync-faro-rn-package-meta.mjs
          yarn quality:format:packages
          if git diff --quiet; then
            echo "No lockfile, package meta, or formatting changes."
            exit 0
          fi
          # Match the identity the release-please-action uses for its commits
          # on the same branch, so this commit appears as the same bot.
          git config user.name 'app-o11y-kwl-ci[bot]'
          git config user.email 'app-o11y-kwl-ci[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'chore: refresh yarn.lock and format release files'
          git push

  verify:
    name: Verify release
    runs-on: ubuntu-latest
    needs: release-please
    permissions:
      contents: read
    if: needs.release-please.outputs.releases_created == 'true'
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: main
          fetch-depth: 0

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Lint
        run: yarn quality:lint

      - name: Check circular dependencies
        run: yarn quality:circular-deps

      - name: Unit tests
        run: yarn quality:test || yarn quality:test || yarn quality:test

  publish:
    name: Publish to NPM
    runs-on: ubuntu-latest
    # Trusted Publishing (OIDC): configure on npmjs.com for @grafana/faro-react-native
    # and @grafana/faro-react-native-tracing, pointing at this repo, workflow file
    # `.github/workflows/release-please.yml`, and this environment name.
    environment: npm-publish
    needs: [release-please, verify]
    permissions:
      contents: read
      id-token: write
    if: needs.release-please.outputs.releases_created == 'true'
    env:
      NPM_CONFIG_ACCESS: public
      NPM_CONFIG_PROVENANCE: true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: main
          fetch-depth: 0

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build production bundle
        run: yarn build

      - name: Install npm latest version
        run: npm install -g npm@latest

      - name: Publish packages to NPM
        run: npm run publish -- from-package --yes --no-private
