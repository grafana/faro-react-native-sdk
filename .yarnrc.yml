# DO NOT add `approvedGitRepositories` to this file. yarn 4.14+ treats any
# allow-listed pattern as a permitted git resolution at install time, which
# would let arbitrary git deps slip past the registry's malware scanning and
# provenance checks. There are no first-party git deps in this project, so
# the key should remain absent (yarn rejects all git resolutions by default
# in that case). See https://yarnpkg.com/configuration/yarnrc#approvedGitRepositories.

enableImmutableInstalls: true

enableScripts: false

nodeLinker: node-modules

npmMinimalAgeGate: 7d

yarnPath: .yarn/releases/yarn-4.17.0.cjs
